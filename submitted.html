<!DOCTYPE html>
<html lang="en">

    <style>
        .thanks {
            margin-top: 250px;
            text-align: center;
        }

        .btn {
            color: rgb(0, 0, 0);
            font-family: sans-serif;
            font-weight: bolder;
            font-size: 16px;
            min-height: 6vh;
            display: flex;
            justify-content: center;
            align-items: center;

            width: 100%;
            margin: 0 auto;
            border-radius: 5px;
            border-color: rgb(145, 145, 145);
            outline: none;
        }

        .btn:hover {
            cursor: pointer;
            color: rgb(0, 89, 254);
            border-color: rgb(0, 89, 254);
            text-shadow: 1px 1px #a7a6a6;
        }
